<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>William's Online Business Card</title>
    <!-- CSS 옷장 연결 (S1 데모 핵심) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 id="main-title">😎 William 의 프로필</h1>
    
    <p class="alert-text"><strong>공지:</strong> 제 온라인 명함에 오신 것을 환영합니다!</p>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="profile photo">
        <h2>William Chung</h2>
        <p>저는 웹 프로그래밍 세계를 탐험 중인 코딩 입문자입니다.</p>
        <p>아래에서 제게 이메일을 보낼 수 있습니다.</p>
        
        <form>
            <label for="visitor-email">이메일 주소:</label>
            <input type="email" id="visitor-email" placeholder="example@stu.ac.kr">
            <button type="submit">나에게 연락하기</button>
        </form>
    </div>

</body>
</html>
