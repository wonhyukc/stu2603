<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>William's Online Business Card (Week 6 Baseline)</title>
    <!-- [Reset Code] Baseline for Week 6 practice based on Week 5 final state. -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 id="main-title">😎 William's Profile</h1>
    
    <p class="alert-text"><strong>Notice:</strong> Welcome to my online business card!</p>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="profile photo">
        <h2>William Chung</h2>
        <p>I am a coding beginner exploring the world of web programming.</p>
        <p>You can send me an email below.</p>
        
        <form>
            <label for="visitor-email">Email Address:</label>
            <input type="email" id="visitor-email" placeholder="example@stu.ac.kr">
            <button type="submit">Contact Me</button>
        </form>
    </div>

</body>
</html>
