<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Awesome Website</title>
    <!-- Using Tailwind CSS for fast and stylish design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.5s ease;
        }

        /* Glassmorphism effect: A transparent look like frosted glass */
        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .dark-mode {
            background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
        }

        /* Hover animation to make the card "lift" */
        .hover-lift {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hover-lift:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body class="p-6">

    <!-- Main Card Container -->
    <div id="mainCard" class="glass max-w-md w-full rounded-3xl p-8 text-white text-center hover-lift">

        <!-- Profile Image Area (Using Emojis) -->
        <div id="emojiDisplay"
            class="w-24 h-24 bg-white/30 rounded-full mx-auto flex items-center justify-center text-5xl mb-6 shadow-inner">
            🚀
        </div>

        <h1 class="text-3xl font-bold mb-2">Hello! I'm a Coding Enthusiast</h1>
        <p class="text-white/80 mb-6">I am building my own wonderful world using HTML, CSS, and JavaScript.</p>

        <!-- Tech Stack Tags -->
        <div class="flex flex-wrap justify-center gap-2 mb-8">
            <span class="bg-blue-500/50 px-3 py-1 rounded-full text-sm border border-white/20">#HTML5</span>
            <span class="bg-purple-500/50 px-3 py-1 rounded-full text-sm border border-white/20">#CSS3</span>
            <span class="bg-pink-500/50 px-3 py-1 rounded-full text-sm border border-white/20">#JavaScript</span>
        </div>

        <!-- Interactive Buttons -->
        <div class="space-y-3">
            <button onclick="changeEmoji()"
                class="w-full bg-white text-purple-700 font-bold py-3 rounded-xl hover:bg-opacity-90 transition active:scale-95">
                Change My Mood
            </button>
            <button onclick="toggleDarkMode()"
                class="w-full bg-black/20 text-white font-medium py-3 rounded-xl hover:bg-black/30 transition border border-white/10">
                Switch Theme
            </button>
        </div>

        <!-- Footer Info -->
        <div class="mt-8 pt-6 border-t border-white/20 text-sm text-white/60">
            Created with ❤️ by Future Developer
        </div>
    </div>

    <script>
        // JavaScript Feature 1: Random Emoji Changer
        function changeEmoji() {
            const emojis = ['💻', '✨', '🔥', '🎨', '🌟', '🌈', '⚡', '🤖'];
            const emojiDiv = document.getElementById('emojiDisplay');
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            emojiDiv.innerText = randomEmoji;

            // Add a quick "pop" animation when clicked
            emojiDiv.animate([
                { transform: 'scale(1)' },
                { transform: 'scale(1.3)' },
                { transform: 'scale(1)' }
            ], { duration: 300 });
        }

        // JavaScript Feature 2: Dark Mode Toggle
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            console.log("Theme has been toggled!");
        }
    </script>
</body>

</html>
