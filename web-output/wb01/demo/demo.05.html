<!DOCTYPE html>
<html>

<head>
    <title>My First Lesson</title>
    <style>
        .green {
            color: green;
        }

        .purple {
            /* Corrected syntax: property: value unit; */
            color: purple;
            font-size: 25px;
        }

        .clickable {
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>

<body>

    <h1 id="helloBtn" class="clickable">hello</h1>

    <h2 id="head2Btn" class="green clickable">head2</h2>
    <p>This is the first body section.</p>

    <br /><br /><br /><br /><br />

    <h2 class="green">head2 again</h2>
    <p class="purple" id="purpleText">
        This text is now purple and 15px large!
    </p>

    <script>
        // Add JavaScript to handle click events
        document.getElementById('helloBtn').addEventListener('click', function () {
            alert('You clicked Hello!');
            this.style.color = 'blue';
        });

        document.getElementById('head2Btn').addEventListener('click', function () {
            // Change class name on click
            this.className = 'purple clickable';
            this.innerText = 'head2 (Color changed!)';
        });
    </script>

</body>

</html>
